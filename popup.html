<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      padding: 16px;
      font-family: "Google Sans", "Roboto", Arial, sans-serif;
      background: #fff;
      color: #202124;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    p.hint {
      font-size: 11px;
      color: #5f6368;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    p.hint code {
      background: #f1f3f4;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: "Roboto Mono", "Courier New", monospace;
    }
    textarea {
      width: 100%;
      height: 190px;
      padding: 10px 12px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-size: 12px;
      font-family: "Roboto Mono", "Courier New", monospace;
      resize: vertical;
      line-height: 1.55;
      outline: none;
      color: #202124;
    }
    textarea:focus { border-color: #1a73e8; }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
    }
    button {
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: background 0.15s;
    }
    #save { background: #1a73e8; color: #fff; }
    #save:hover { background: #1557b0; }
    #reset { background: transparent; color: #5f6368; border: 1px solid #dadce0; }
    #reset:hover { background: #f1f3f4; }
    #status { font-size: 12px; margin-left: auto; }
  </style>
</head>
<body>
  <h2>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 28 28">
      <path d="M14 2C14 2 15.5 10 20 14C15.5 18 14 26 14 26C14 26 12.5 18 8 14C12.5 10 14 2 14 2Z" fill="#1a73e8"/>
      <path d="M2 14C2 14 10 12.5 14 8C18 12.5 26 14 26 14C26 14 18 15.5 14 20C10 15.5 2 14 2 14Z" fill="#1a73e8"/>
    </svg>
    Gemini Prompt
  </h2>
  <p class="hint">Edit the prompt sent to Gemini. Use <code>(detalles del video)</code> as the placeholder — it will be replaced with the video title, channel, and URL.</p>
  <textarea id="prompt" spellcheck="false"></textarea>
  <div class="actions">
    <button id="save">Save</button>
    <button id="reset">Reset to default</button>
    <span id="status"></span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
